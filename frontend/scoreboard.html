<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard</title>
  <link rel="stylesheet" href="./CSS/styles.css" />
  <link rel="stylesheet" href="./CSS/scoreboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wdth@50..100&display=swap" rel="stylesheet">
</head>
<body class="scoreboard-body">
  <div id="scoreboard-loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">Daten werden geladen...</div>
  </div>
  <div id="scoreboard-content">
    <div id="platz1">
    <div class="platz-header">Platz 1</div>
    <div class="platz-sub" id="p1-datetime">—</div>
    <div class="platz-sub" id="p1-bewerb">—</div>
    <div class="platz-row"><span class="platz-cell label" id="p1-name-h">Heim</span><div class="platz-scores"><span class="platz-cell" id="p1-h-s1">0</span><span class="platz-cell" id="p1-h-s2">0</span><span class="platz-cell" id="p1-h-s3">0</span><span class="platz-cell" id="p1-h-p">-</span></div></div>
    <div class="platz-vs"><span>-</span><div class="platz-scores platz-scores-ghost"><span class="platz-cell">.</span><span class="platz-cell">.</span><span class="platz-cell">.</span><span class="platz-cell">.</span></div></div>
    <div class="platz-row"><span class="platz-cell label" id="p1-name-g">Gast</span><div class="platz-scores"><span class="platz-cell" id="p1-g-s1">0</span><span class="platz-cell" id="p1-g-s2">0</span><span class="platz-cell" id="p1-g-s3">0</span><span class="platz-cell" id="p1-g-p">-</span></div></div>
  </div>
  <div id="platz2">
    <div class="platz-header">Platz 2</div>
    <div class="platz-sub" id="p2-datetime">—</div>
    <div class="platz-sub" id="p2-bewerb">—</div>
    <div class="platz-row"><span class="platz-cell label" id="p2-name-h">Heim</span><div class="platz-scores"><span class="platz-cell" id="p2-h-s1">0</span><span class="platz-cell" id="p2-h-s2">0</span><span class="platz-cell" id="p2-h-s3">0</span><span class="platz-cell" id="p2-h-p">-</span></div></div>
    <div class="platz-vs"><span>-</span><div class="platz-scores platz-scores-ghost"><span class="platz-cell">.</span><span class="platz-cell">.</span><span class="platz-cell">.</span><span class="platz-cell">.</span></div></div>
    <div class="platz-row"><span class="platz-cell label" id="p2-name-g">Gast</span><div class="platz-scores"><span class="platz-cell" id="p2-g-s1">0</span><span class="platz-cell" id="p2-g-s2">0</span><span class="platz-cell" id="p2-g-s3">0</span><span class="platz-cell" id="p2-g-p">-</span></div></div>
  </div>
  <div id="rechts">
    <div id="nächste"></div>
    <div class="rechts-line"></div>
    <div id="letzte"></div>
  </div>
  </div>
  <script type="module" src="./JS/scoreboardPolling.js"></script>
</body>
</html>
